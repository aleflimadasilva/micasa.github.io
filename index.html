<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IoT PRO</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#000; color:#fff; text-align:center;">

<h2>🌡️ Dashboard IoT</h2>

<h1 id="temp">-- °C</h1>
<h2 id="bat">--%</h2>

<button onclick="ligar()">Ligar Sala</button>
<button onclick="desligar()">Desligar Sala</button>

<canvas id="grafico"></canvas>

<script>
const CONFIG = {
    host: "wss://SEU_BROKER:8884/mqtt",
    user: "usuario",
    pass: "senha",
    topics: {
        state: "alefsilva/device01/state",
        cmd: "alefsilva/device01/cmd"
    }
};

const client = mqtt.connect(CONFIG.host, {
    username: CONFIG.user,
    password: CONFIG.pass
});

const chart = new Chart(document.getElementById("grafico"), {
    type: "line",
    data: { labels: [], datasets: [{ data: [] }] }
});

client.on("connect", () => {
    client.subscribe(CONFIG.topics.state);
});

client.on("message", (topic, message) => {
    const data = JSON.parse(message.toString());

    document.getElementById("temp").innerText = data.temp + " °C";
    document.getElementById("bat").innerText = data.bat_pct + "%";

    chart.data.labels.push(new Date().toLocaleTimeString());
    chart.data.datasets[0].data.push(data.temp);

    if (chart.data.labels.length > 10) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
});

/* COMANDOS */
function ligar() {
    client.publish(CONFIG.topics.cmd, JSON.stringify({ sala: "ON" }));
}

function desligar() {
    client.publish(CONFIG.topics.cmd, JSON.stringify({ sala: "OFF" }));
}
</script>

</body>
</html>
