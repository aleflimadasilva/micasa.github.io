<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Temperatura</title>

  <!-- MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    #temp {
      font-size: 60px;
      margin: 20px;
      color: #38bdf8;
    }

    canvas {
      max-width: 700px;
      margin: auto;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<h1>🌡️ Temperatura em Tempo Real</h1>
<div id="temp">-- °C</div>
<div class="status" id="status">Conectando...</div>

<canvas id="grafico"></canvas>

<script>
/* =========================
   CONFIGURAÇÕES
========================= */

const MQTT_CONFIG = {
  host: "wss://28c03fa8cec54867b74cdb6592fcbc33.s1.eu.hivemq.cloud:8884/mqtt",
  username: "AlefSilva12",
  password: "@Alef123",
  topic: "alefsilva/temperatura"
};

/* =========================
   CONEXÃO MQTT
========================= */

const client = mqtt.connect(MQTT_CONFIG.host, {
  username: MQTT_CONFIG.username,
  password: MQTT_CONFIG.password,
  reconnectPeriod: 2000,
  connectTimeout: 4000
});

const statusEl = document.getElementById("status");

client.on("connect", () => {
  console.log("CONECTADO AO MQTT");
  statusEl.innerText = "🟢 Conectado";
  client.subscribe(MQTT_CONFIG.topic);
});

client.on("reconnect", () => {
  console.log("RECONectando...");
  statusEl.innerText = "🟡 Reconectando...";
});

client.on("error", (err) => {
  console.error("ERRO:", err);
  statusEl.innerText = "🔴 Erro de conexão";
});

client.on("offline", () => {
  console.log("OFFLINE");
  statusEl.innerText = "⚫ Offline";
});

/* =========================
   GRÁFICO
========================= */

let temperaturas = [];
let labels = [];

const ctx = document.getElementById("grafico").getContext("2d");

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Temperatura (°C)",
      data: temperaturas,
      borderWidth: 2,
      tension: 0.3
    }]
  },
  options: {
    responsive: true,
    scales: {
      y: {
        beginAtZero: false
      }
    }
  }
});

/* =========================
   RECEBIMENTO DE DADOS
========================= */

client.on("message", (topic, message) => {
  console.log("Mensagem recebida:", message.toString());

  const temp = parseFloat(message.toString());

  if (isNaN(temp)) return;

  document.getElementById("temp").innerText = temp + " °C";

  const now = new Date().toLocaleTimeString();

  temperaturas.push(temp);
  labels.push(now);

  if (temperaturas.length > 20) {
    temperaturas.shift();
    labels.shift();
  }

  chart.update();
});
</script>

</body>
</html>
