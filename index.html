<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel IoT</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  background: #111827;
  border-radius: 12px;
  padding: 20px;
  width: 350px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

h2 {
  margin-bottom: 10px;
}

/* GAUGE */
.gauge {
  position: relative;
  width: 250px;
  height: 150px;
  margin: auto;
}

.gauge svg {
  width: 100%;
}

.needle {
  width: 4px;
  height: 90px;
  background: white;
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform-origin: center bottom;
  transform: translateX(-50%) rotate(0deg);
  border-radius: 2px;
}

.center-value {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
}

/* STATUS */
.status {
  margin-top: 10px;
  font-size: 14px;
  color: #94a3b8;
}

canvas {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<!-- GAUGE -->
<div class="card">
  <h2>🌡️ Sensor</h2>

  <div class="gauge">
    <svg viewBox="0 0 200 100">
      <path d="M10 100 A90 90 0 0 1 190 100"
        stroke="#38bdf8"
        stroke-width="12"
        fill="none"/>
    </svg>

    <div class="needle" id="needle"></div>
    <div class="center-value" id="temp">-- °C</div>
  </div>

  <div class="status" id="status">Conectando...</div>
</div>

<!-- GRÁFICO -->
<div class="card">
  <h2>📈 Linha do Tempo</h2>
  <canvas id="grafico"></canvas>
</div>

</div>

<script>
const MQTT_CONFIG = {
  host: "wss://28c03fa8cec54867b74cdb6592fcbc33.s1.eu.hivemq.cloud:8884/mqtt",
  username: "AlefSilva12",
  password: "@Alef123",
  topic: "alefsilva/temperatura"
};

const client = mqtt.connect(MQTT_CONFIG.host, {
  username: MQTT_CONFIG.username,
  password: MQTT_CONFIG.password,
  reconnectPeriod: 2000
});

const statusEl = document.getElementById("status");

/* MQTT */
client.on("connect", () => {
  statusEl.innerText = "🟢 Conectado";
  client.subscribe(MQTT_CONFIG.topic);
});

client.on("reconnect", () => {
  statusEl.innerText = "🟡 Reconectando...";
});

client.on("error", () => {
  statusEl.innerText = "🔴 Erro";
});

/* GRÁFICO */
let temperaturas = [];
let labels = [];

const chart = new Chart(document.getElementById("grafico"), {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Temperatura",
      data: temperaturas,
      borderColor: "#38bdf8",
      borderWidth: 2,
      tension: 0,
      stepped: true
    }]
  },
  options: {
    plugins: {
      legend: {
        labels: {
          color: "white"
        }
      }
    },
    scales: {
      x: {
        ticks: { color: "white" }
      },
      y: {
        ticks: { color: "white" }
      }
    }
  }
});

/* GAUGE */
function updateGauge(temp) {
  const needle = document.getElementById("needle");

  let angle = (temp / 50) * 180;
  if (angle > 180) angle = 180;
  if (angle < 0) angle = 0;

  needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
}

/* RECEBER DADOS */
client.on("message", (topic, message) => {
  const temp = parseFloat(message.toString());
  if (isNaN(temp)) return;

  document.getElementById("temp").innerText = temp + " °C";

  updateGauge(temp);

  const now = new Date().toLocaleTimeString();
  temperaturas.push(temp);
  labels.push(now);

  if (temperaturas.length > 30) {
    temperaturas.shift();
    labels.shift();
  }

  chart.update();
});
</script>

</body>
</html>
