<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel IoT - Temperatura</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  margin-top: 20px;
}

#temp {
  font-size: 40px;
  margin: 10px;
}

/* Gauge */
.gauge {
  width: 250px;
  height: 125px;
  margin: auto;
  position: relative;
}

.gauge svg {
  transform: rotate(180deg);
}

 /* ponteiro do gauge */ 
.needle {
  width: 4px;
  height: 100px;
  background: red;
  position: absolute;

  left: 50%;
  bottom: 0;

  transform-origin: center bottom;
  transform: translateX(-50%) rotate(0deg);
}

/* Status */
.status {
  margin-top: 10px;
  color: #94a3b8;
}

canvas {
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌡️ Monitor de Temperatura</h1>
<div id="temp">-- °C</div>

<!-- Gauge -->
<div class="gauge">
  <svg width="250" height="125">
    <path d="M10 125 A115 115 0 0 1 240 125" stroke="#38bdf8" stroke-width="15" fill="none"/>
  </svg>
  <div class="needle" id="needle"></div>
</div>

<div class="status" id="status">Conectando...</div>

<canvas id="grafico"></canvas>

</div>

<script>
/* =========================
   CONFIG
========================= */
const MQTT_CONFIG = {
  host: "wss://28c03fa8cec54867b74cdb6592fcbc33.s1.eu.hivemq.cloud:8884/mqtt",
  username: "AlefSilva12",
  password: "@Alef123",
  topic: "alefsilva/temperatura"
};

/* =========================
   MQTT
========================= */
const client = mqtt.connect(MQTT_CONFIG.host, {
  username: MQTT_CONFIG.username,
  password: MQTT_CONFIG.password,
  reconnectPeriod: 2000
});

const statusEl = document.getElementById("status");

client.on("connect", () => {
  statusEl.innerText = "🟢 Conectado";
  client.subscribe(MQTT_CONFIG.topic);
});

client.on("reconnect", () => {
  statusEl.innerText = "🟡 Reconectando...";
});

client.on("error", () => {
  statusEl.innerText = "🔴 Erro";
});

/* =========================
   GRÁFICO (DENTE DE SERRA)
========================= */
let temperaturas = [];
let labels = [];

const chart = new Chart(document.getElementById("grafico"), {
  type: "line",
  data: {
    labels: labels,
    datasets: [{
      label: "Temperatura",
      data: temperaturas,
      borderWidth: 2,
      tension: 0, // 🔥 isso cria o efeito "dente de serra"
      stepped: true
    }]
  }
});

/* =========================
   GAUGE
========================= */
function updateGauge(temp) {
  const needle = document.getElementById("needle");

  // faixa de 0 a 50 graus
  let angle = (temp / 50) * 180;

  if (angle > 180) angle = 180;
  if (angle < 0) angle = 0;

  needle.style.transform = `rotate(${angle}deg)`;
}

/* =========================
   RECEBIMENTO
========================= */
client.on("message", (topic, message) => {
  const temp = parseFloat(message.toString());
  if (isNaN(temp)) return;

  document.getElementById("temp").innerText = temp + " °C";

  // Gauge
  updateGauge(temp);

  // Gráfico
  const now = new Date().toLocaleTimeString();
  temperaturas.push(temp);
  labels.push(now);

  if (temperaturas.length > 30) {
    temperaturas.shift();
    labels.shift();
  }

  chart.update();
});
</script>

</body>
</html>
