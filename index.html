<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel IoT 3.7 | Alef</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* =======================
   ESTILO GERAL
======================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0000;
    color: white;
}

/* ANIMAÇÃO DE ALERTA */
@keyframes piscar-alerta {
    0% { background: #111827; }
    50% { background: #7f1d1d; }
    100% { background: #111827; }
}

.alerta-ativo {
    animation: piscar-alerta 0.8s infinite;
    border: 2px solid #ef4444 !important;
}

/* =======================
   HOME ESTILO APP
======================= */
.home {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    justify-content: center;
    padding: 20px;
}

.app-card {
    width: 180px; 
    height: 180px;
    background: #111827;
    border-radius: 25px;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: transform 0.2s;
}

.app-card:hover { transform: scale(1.05); }
.app-card { font-size: 40px; }
.app-card span { margin-top: 15px; font-size: 18px; }

/* =======================
   TELAS INTERNAS
======================= */
.tela { display: none; padding: 20px; }
.tela.active { display: block; }

.voltar {
    margin-bottom: 20px;
    cursor: pointer;
    color: #38bdf8;
    display: inline-block;
    padding: 8px 15px;
    border: 2px solid #38bdf8;
    border-radius: 10px;
    transition: all 0.3s;
}
.voltar:hover { background: rgba(56, 189, 248, 0.1); }

/* =======================
   CONTAINER DE CARDS
======================= */
.container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.3s;
}

/* BOTÕES LIGAR/DESLIGAR */
.control-group { display: flex; gap: 10px; margin-top: 10px; }
.btn-on { background: #22c55e; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }
.btn-off { background: #ef4444; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }

.lamp-status { margin: 10px; font-weight: bold; }
.status-on { color: #22c55e; }
.status-off { color: #94a3b8; }

/* GAUGE */
.gauge { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 200px; margin: 20px auto 0 auto; }
.gauge-visual { position: relative; width: 200px; height: 120px; }
.needle {
    width: 3px; height: 70px; background: #fff; position: absolute;
    bottom: 15px; left: 50%; transform-origin: center bottom;
    transform: translateX(-50%) rotate(-90deg); transition: transform 0.6s ease-in-out;
}
#gauge-temp { margin-top: 10px; font-size: 22px; font-weight: bold; }
.status-inline { font-weight: bold; font-size: 16px; }
canvas { max-height: 150px; }
</style>
</head>

<body>

<div id="home" class="tela active">
    <h2 style="text-align:center; margin-bottom: 30px;">🏠 Painel IoT</h2>
    <div class="home">
    
    <!--todos os cards do menu abaixo AQUI VC CRIA O CARD-->
        <div class="app-card" onclick="abrirTela('geral')">🌡️<span>Geral</span></div>
        <div class="app-card" onclick="abrirTela('sala')">🛋️<span>Sala</span></div>
        <div class="app-card" onclick="abrirTela('quarto')">🛏️<span>Quarto</span></div>
        <div class="app-card" onclick="abrirTela('banheiro')">🚿<span>Banheiro</span></div>
        
        
        <div class="app-card" onclick="abrirTela('Cozinha')">🚿<span>Cozinha</span></div>
        
        
    </div> <!-- ESSE DIV É O FIM DO CONTEINER-->
</div><!-- ESSE DIV É PARA INCLUIR ATEFATOS FORA DA ORGANIZACAO AUTOMATICA DO CONTEINER-->

<div id="geral" class="tela">
    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
    <div class="container">
        <div class="card" id="card-temp">
            <div style="display:flex; justify-content: space-between; align-items: center; width:100%; margin-bottom:10px;">
                <h3 style="margin:0;">🌡️ Temperatura</h3>
                <div id="status-mqtt" class="status-inline">Conectando...</div>
            </div>
            <div class="gauge">
                <div class="gauge-visual">
                    <svg viewBox="0 0 200 120">
                        <path d="M 20 100 A 80 80 0 0 1 180 100" stroke="#1f2937" stroke-width="12" fill="none"/>
                        <path d="M 20 100 A 80 80 0 0 1 100 20" stroke="#22c55e" stroke-width="12" fill="none"/>
                        <path d="M 100 20 A 80 80 0 0 1 180 100" stroke="#FFFF00" stroke-width="12" fill="none"/>
                        <path d="M 169 60 A 80 80 0 0 1 180 100" stroke="#ef4444" stroke-width="12" fill="none"/>
                    </svg>
                    <div class="needle" id="needle"></div>
                </div>
                <div id="gauge-temp">-- °C</div>
            </div>
        </div>

        <div class="card">
            <h3>📈 Histórico</h3>
            <canvas id="grafico"></canvas>
            <button onclick="baixarHistorico()">📥 Baixar CSV</button>
        </div>
    </div>
</div>
      <!-- artefatos do carde sala -->
<div id="sala" class="tela"><div class="voltar" onclick="voltar()">⬅ Voltar</div><div class="container"><div class="card"><h3>🛋️ Luz Sala</h3><div id="status-sala" class="lamp-status status-off">DESLIGADA</div><div class="control-group"><button class="btn-on" onclick="enviarComando('sala','ON')">LIGAR</button><button class="btn-off" onclick="enviarComando('sala','OFF')">DESLIGAR</button></div></div></div></div>

   <!-- artefatos do card quarto -->
<div id="quarto" class="tela"><div class="voltar" onclick="voltar()">⬅ Voltar</div><div class="container"><div class="card"><h3>🛏️ Luz Quarto</h3><div id="status-quarto" class="lamp-status status-off">DESLIGADA</div><div class="control-group"><button class="btn-on" onclick="enviarComando('quarto','ON')">LIGAR</button><button class="btn-off" onclick="enviarComando('quarto','OFF')">DESLIGAR</button></div></div></div></div>

   <!-- artefatos do carde banheiro-->

<div id="banheiro" class="tela"><div class="voltar" onclick="voltar()">⬅ Voltar</div><div class="container"><div class="card"><h3>🚿 Luz Banheiro</h3><div id="status-banheiro" class="lamp-status status-off">DESLIGADA</div><div class="control-group"><button class="btn-on" onclick="enviarComando('banheiro','ON')">LIGAR</button><button class="btn-off" onclick="enviarComando('banheiro','OFF')">DESLIGAR</button></div></div></div></div>

   <!-- artefatos do carde teste de card cozinha-->
<div id="Cozinha" class="tela"><div class="voltar" onclick="voltar()">⬅ Voltar</div><div class="container"><div class="card"><h3>🚿 Luz Banheiro</h3><div id="status-banheiro" class="lamp-status status-off">DESLIGADA</div><div class="control-group"><button class="btn-on" onclick="enviarComando('banheiro','ON')">LIGAR</button><button class="btn-off" onclick="enviarComando('banheiro','OFF')">DESLIGAR</button></div></div></div></div>

   
<script>
function abrirTela(id) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function voltar() { abrirTela('home'); }

const CONFIG = {
    host: "wss://28c03fa8cec54867b74cdb6592fcbc33.s1.eu.hivemq.cloud:8884/mqtt",
    user: "AlefSilva12",
    pass: "@Alef123",
    topics: {
        temp: "alefsilva/temperatura",
        sala_cmd: "alefsilva/sala/comando",
        sala_stat: "alefsilva/sala/status",
        quarto_cmd: "alefsilva/quarto/comando",
        quarto_stat: "alefsilva/quarto/status",
        banheiro_cmd: "alefsilva/banheiro/comando",
        banheiro_stat: "alefsilva/banheiro/status"
    }
};

const client = mqtt.connect(CONFIG.host, { username: CONFIG.user, password: CONFIG.pass });
let logsParaCSV = [];

client.on("connect", () => {
    document.getElementById("status-mqtt").innerText = "🟢 Online";
    client.subscribe([CONFIG.topics.temp, CONFIG.topics.sala_stat, CONFIG.topics.quarto_stat, CONFIG.topics.banheiro_stat]);
});

client.on("message", (topic, message) => {
    const msg = message.toString();
    if (topic === CONFIG.topics.temp) processarTemperatura(parseFloat(msg));
    if (topic.includes("status")) {
        const local = topic.split('/')[1];
        atualizarLampada(local, msg);
    }
});

function enviarComando(dispositivo, acao) {
    client.publish(CONFIG.topics[dispositivo + "_cmd"], acao);
}

function atualizarLampada(local, estado) {
    const el = document.getElementById(`status-${local}`);
    if (!el) return;
    el.innerText = (estado === "ON") ? "LIGADA" : "DESLIGADA";
    el.className = "lamp-status " + (estado === "ON" ? "status-on" : "status-off");
}

const chart = new Chart(document.getElementById('grafico'), {
    type: 'line',
    data: { labels: [], datasets: [{ data: [], borderColor: '#38bdf8', tension: 0.3 }] },
    options: { plugins: { legend: { display: false } } }
});

function processarTemperatura(valor) {
    if (isNaN(valor)) return;
    valor = Math.max(-20, Math.min(100, valor));
    
    const displayTemp = document.getElementById("gauge-temp");
    const cardTemp = document.getElementById("card-temp");
    const statusMqtt = document.getElementById("status-mqtt");
    
    displayTemp.innerText = valor.toFixed(1) + " °C";

    // LÓGICA DE ALERTA > 30 GRAUS
    if (valor > 30) {
        cardTemp.classList.add("alerta-ativo");
        statusMqtt.innerText = "⚠️ ALERTA";
        statusMqtt.style.color = "#ef4444";
    } else {
        cardTemp.classList.remove("alerta-ativo");
        statusMqtt.innerText = "🟢 Online";
        statusMqtt.style.color = "white";
    }

    let angulo = ((valor + 20) / 120) * 180 - 90;
    document.getElementById("needle").style.transform = `translateX(-50%) rotate(${angulo}deg)`;

    const hora = new Date().toLocaleTimeString();
    chart.data.labels.push(hora);
    chart.data.datasets[0].data.push(valor);
    if (chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
    chart.update();
    logsParaCSV.push({ data: new Date().toLocaleDateString(), hora, valor });
}

function baixarHistorico() {
    let conteudo = "Data,Hora,Temperatura\n" + logsParaCSV.map(l => `${l.data},${l.hora},${l.valor}`).join("\n");
    const blob = new Blob([conteudo], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'historico_iot.csv'; a.click();
}
</script>
</body>
</html>
