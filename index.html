<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel IoT 1.1 | Alef</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0a0000; color: white; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        
        .card { 
            background: #111827; border-radius: 12px; padding: 20px; width: 320px; 
            text-align: center; box-shadow: 0 0 15px rgba(0,0,0,0.6); 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* ESTILO DOS BOTÕES DE CONTROLE */
        .control-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        
        .btn-on { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-off { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-on:hover, .btn-off:hover { opacity: 0.8; transform: scale(1.02); }

        /* STATUS DA LÂMPADA */
        .lamp-status { font-size: 18px; font-weight: bold; margin: 15px 0; padding: 5px; border-radius: 5px; }
        .status-on { color: #22c55e; text-shadow: 0 0 5px #22c55e; }
        .status-off { color: #94a3b8; }

        /* OUTROS ESTILOS JÁ EXISTENTES */
        .gauge { position: relative; width: 200px; height: 120px; margin: auto; }
        svg { width: 100%; }
        .needle { width: 3px; height: 70px; background: #fff; position: absolute; bottom: 15px; left: 50%; transform-origin: center bottom; transform: translateX(-50%) rotate(-90deg); transition: 0.4s; }
        .center-value { font-size: 28px; font-weight: bold; margin-top: 5px; }
        .status { margin-top: 10px; font-size: 12px; color: #94a3b8; }
        canvas { max-height: 150px; }
        .btn-download { margin-top: 10px; padding: 8px; cursor: pointer; border-radius: 5px; border: none; background: #38bdf8; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- CARD TEMPERATURA -->
    <div class="card">
        <h2>🌡️ Temperatura</h2>
        <div class="gauge">
            <svg viewBox="0 0 200 100">
                <path d="M 10 100 A 90 90 0 0 1 190 100" stroke="#1f2937" stroke-width="12" fill="none"/>
                <path d="M 10 100 A 90 90 0 0 1 100 10" stroke="#22c55e" stroke-width="12" fill="none"/>
                <path d="M 100 10 A 90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="12" fill="none"/>
            </svg>
            <div class="needle" id="needle"></div>
            <div class="center-value" id="temp">-- °C</div>
        </div>
        <div class="status" id="status">Conectando...</div>
    </div>

    <!-- CARD GRÁFICO -->
    <div class="card">
        <h2>📈 Histórico</h2>
        <canvas id="grafico"></canvas>
        <button class="btn-download" onclick="baixarHistorico()">📥 Baixar CSV</button>
        <div class="status" id="count-status">0 logs</div>
    </div>

    <!-- CARD LÂMPADA SALA -->
    <div class="card">
        <h2>🛋️ Lâmpada Sala</h2>
        <div id="status-sala" class="lamp-status status-off">DESLIGADA</div>
        <div class="control-group">
            <button class="btn-on" onclick="controlar('sala', 'ON')">LIGAR</button>
            <button class="btn-off" onclick="controlar('sala', 'OFF')">DESLIGAR</button>
        </div>
        <div class="status">Tópico: alefsilva/sala/status</div>
    </div>

    <!-- CARD LÂMPADA QUARTO -->
    <div class="card">
        <h2>🛏️ Lâmpada Quarto</h2>
        <div id="status-quarto" class="lamp-status status-off">DESLIGADA</div>
        <div class="control-group">
            <button class="btn-on" onclick="controlar('quarto', 'ON')">LIGAR</button>
            <button class="btn-off" onclick="controlar('quarto', 'OFF')">DESLIGAR</button>
        </div>
        <div class="status">Tópico: alefsilva/quarto/status</div>
    </div>
</div>

<script>
    const CONFIG = {
        host: "wss://28c03fa8cec54867b74cdb6592fcbc33.s1.eu.hivemq.cloud:8884/mqtt",
        user: "AlefSilva12",
        pass: "@Alef123",
        topics: {
            temp: "alefsilva/temperatura",
            sala_cmd: "alefsilva/sala/comando",
            sala_stat: "alefsilva/sala/status",
            quarto_cmd: "alefsilva/quarto/comando",
            quarto_stat: "alefsilva/quarto/status"
        }
    };

    const client = mqtt.connect(CONFIG.host, { username: CONFIG.user, password: CONFIG.pass });
    let historicoCSV = [];

    client.on("connect", () => {
        document.getElementById("status").innerText = "🟢 Online";
        client.subscribe([CONFIG.topics.temp, CONFIG.topics.sala_stat, CONFIG.topics.quarto_stat]);
    });

    // FUNÇÃO PARA ENVIAR COMANDO
    function controlar(local, acao) {
        const topic = local === 'sala' ? CONFIG.topics.sala_cmd : CONFIG.topics.quarto_cmd;
        client.publish(topic, acao);
    }

    // RECEBER MENSAGENS E ATUALIZAR ESTADOS
    client.on("message", (topic, message) => {
        const msg = message.toString();

        if (topic === CONFIG.topics.temp) {
            atualizarPainelTemp(parseFloat(msg));
        } 
        else if (topic === CONFIG.topics.sala_stat) {
            atualizarUI('sala', msg);
        } 
        else if (topic === CONFIG.topics.quarto_stat) {
            atualizarUI('quarto', msg);
        }
    });

    function atualizarUI(local, estado) {
        const el = document.getElementById(`status-${local}`);
        el.innerText = estado === "ON" ? "LIGADA" : "DESLIGADA";
        el.className = `lamp-status ${estado === "ON" ? "status-on" : "status-off"}`;
    }

    // LOGICA DO GRÁFICO E GAUGE (Simplificada para o exemplo)
    const ctx = document.getElementById('grafico').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Temp', data: [], borderColor: '#38bdf8', tension: 0.4 }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#fff' } } } }
    });

    function atualizarPainelTemp(valor) {
        if(isNaN(valor)) return;
        document.getElementById("temp").innerText = valor.toFixed(1) + " °C";
        
        // Ponteiro
        let angle = ((valor + 20) / 120) * 180 - 90;
        document.getElementById("needle").style.transform = `translateX(-50%) rotate(${angle}deg)`;

        // Gráfico
        const hora = new Date().toLocaleTimeString();
        chart.data.labels.push(hora);
        chart.data.datasets[0].data.push(valor);
        if(chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update();

        // Historico para CSV
        historicoCSV.push({ data: new Date().toLocaleDateString(), hora, valor });
        document.getElementById("count-status").innerText = `${historicoCSV.length} logs`;
    }

    function baixarHistorico() {
        let csv = "Data,Hora,Valor\n" + historicoCSV.map(r => `${r.data},${r.hora},${r.valor}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'historico.csv');
        a.click();
    }
</script>
</body>
</html>
