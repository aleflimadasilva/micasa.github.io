<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel IoT 3.7 | Alef</title>

<!-- 
    ═══════════════════════════════════════════════════════════════
    BIBLIOTECAS EXTERNAS
    ═══════════════════════════════════════════════════════════════
    - Chart.js: Cria gráficos bonitos e interativos
    - NENHUMA CREDENCIAL MQTT AQUI! (agora está seguro)
    ═══════════════════════════════════════════════════════════════
-->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════
   ESTILO GERAL - CORES E FUNDOS
   ═══════════════════════════════════════════════════════════════ */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0000;
    color: white;
}

/* ANIMAÇÃO DE ALERTA PARA TEMPERATURA ALTA */
@keyframes piscar-alerta {
    0% { background: #111827; }
    50% { background: #7f1d1d; }  /* Vermelho escuro */
    100% { background: #111827; }
}

.alerta-ativo {
    animation: piscar-alerta 0.8s infinite;
    border: 2px solid #ef4444 !important;
}

/* ═══════════════════════════════════════════════════════════════
   TELA PRINCIPAL (HOME) - CARDS DO MENU
   ═══════════════════════════════════════════════════════════════ */
.home {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    justify-content: center;
    padding: 20px;
}

.app-card {
    width: 180px; 
    height: 180px;
    background: #111827;
    border-radius: 25px;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: transform 0.2s;
}

.app-card:hover { transform: scale(1.05); }
.app-card { font-size: 40px; }
.app-card span { margin-top: 15px; font-size: 18px; }

/* ═══════════════════════════════════════════════════════════════
   TELAS INTERNAS (Sala, Quarto, Banheiro, etc)
   ═══════════════════════════════════════════════════════════════ */
.tela { display: none; padding: 20px; }
.tela.active { display: block; }

.voltar {
    margin-bottom: 20px;
    cursor: pointer;
    color: #38bdf8;
    display: inline-block;
    padding: 8px 15px;
    border: 2px solid #38bdf8;
    border-radius: 10px;
    transition: all 0.3s;
}
.voltar:hover { background: rgba(56, 189, 248, 0.1); }

/* CONTAINER DE CARDS (organização flexível) */
.container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background 0.3s;
}

/* BOTÕES LIGAR/DESLIGAR */
.control-group { display: flex; gap: 10px; margin-top: 10px; }
.btn-on { background: #22c55e; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }
.btn-off { background: #ef4444; border: none; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }

.lamp-status { margin: 10px; font-weight: bold; }
.status-on { color: #22c55e; }   /* Verde = Ligado */
.status-off { color: #94a3b8; }  /* Cinza = Desligado */

/* MEDIDOR ANALÓGICO DE TEMPERATURA */
.gauge { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 200px; margin: 20px auto 0 auto; }
.gauge-visual { position: relative; width: 200px; height: 120px; }
.needle {
    width: 3px; height: 70px; background: #fff; position: absolute;
    bottom: 15px; left: 50%; transform-origin: center bottom;
    transform: translateX(-50%) rotate(-90deg); transition: transform 0.6s ease-in-out;
}
#gauge-temp { margin-top: 10px; font-size: 22px; font-weight: bold; }
.status-inline { font-weight: bold; font-size: 16px; }
canvas { max-height: 150px; }
</style>
</head>

<body>

<!-- ═══════════════════════════════════════════════════════════════
     TELA HOME (MENU PRINCIPAL)
     ═══════════════════════════════════════════════════════════════ -->
<div id="home" class="tela active">
    <h2 style="text-align:center; margin-bottom: 30px;">🏠 Painel IoT</h2>
    <div class="home">
        <!-- CADASTRE NOVOS CARDS AQUI! 
             Basta copiar a linha abaixo e mudar o ícone, texto e ID -->
        <div class="app-card" onclick="abrirTela('geral')">🌡️<span>Geral</span></div>
        <div class="app-card" onclick="abrirTela('sala')">🛋️<span>Sala</span></div>
        <div class="app-card" onclick="abrirTela('quarto')">🛏️<span>Quarto</span></div>
        <div class="app-card" onclick="abrirTela('banheiro')">🚿<span>Banheiro</span></div>
        <div class="app-card" onclick="abrirTela('cozinha')">🍳<span>Cozinha</span></div>
        <!-- Adicione novos cômodos aqui seguindo o mesmo padrão -->
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TELA GERAL (TEMPERATURA E GRÁFICO)
     ═══════════════════════════════════════════════════════════════ -->
<div id="geral" class="tela">
    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
    <div class="container">
        <div class="card" id="card-temp">
            <div style="display:flex; justify-content: space-between; align-items: center; width:100%; margin-bottom:10px;">
                <h3 style="margin:0;">🌡️ Temperatura</h3>
                <div id="status-mqtt" class="status-inline">Conectando...</div>
            </div>
            <div class="gauge">
                <div class="gauge-visual">
                    <!-- Medidor visual SVG -->
                    <svg viewBox="0 0 200 120">
                        <path d="M 20 100 A 80 80 0 0 1 180 100" stroke="#1f2937" stroke-width="12" fill="none"/>
                        <path d="M 20 100 A 80 80 0 0 1 100 20" stroke="#22c55e" stroke-width="12" fill="none"/>
                        <path d="M 100 20 A 80 80 0 0 1 180 100" stroke="#FFFF00" stroke-width="12" fill="none"/>
                        <path d="M 169 60 A 80 80 0 0 1 180 100" stroke="#ef4444" stroke-width="12" fill="none"/>
                    </svg>
                    <div class="needle" id="needle"></div>
                </div>
                <div id="gauge-temp">-- °C</div>
            </div>
        </div>

        <div class="card">
            <h3>📈 Histórico</h3>
            <canvas id="grafico"></canvas>
            <button onclick="baixarHistorico()">📥 Baixar CSV</button>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TELAS DOS CÔMODOS (LUZES)
     ═══════════════════════════════════════════════════════════════ -->
     
<!-- TELA DA SALA -->
<div id="sala" class="tela">
    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
    <div class="container">
        <div class="card">
            <h3>🛋️ Luz Sala</h3>
            <div id="status-sala" class="lamp-status status-off">DESLIGADA</div>
            <div class="control-group">
                <button class="btn-on" onclick="enviarComando('sala','ON')">LIGAR</button>
                <button class="btn-off" onclick="enviarComando('sala','OFF')">DESLIGAR</button>
            </div>
        </div>
    </div>
</div>

<!-- TELA DO QUARTO -->
<div id="quarto" class="tela">
    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
    <div class="container">
        <div class="card">
            <h3>🛏️ Luz Quarto</h3>
            <div id="status-quarto" class="lamp-status status-off">DESLIGADA</div>
            <div class="control-group">
                <button class="btn-on" onclick="enviarComando('quarto','ON')">LIGAR</button>
                <button class="btn-off" onclick="enviarComando('quarto','OFF')">DESLIGAR</button>
            </div>
        </div>
    </div>
</div>

<!-- TELA DO BANHEIRO -->
<div id="banheiro" class="tela">
    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
    <div class="container">
        <div class="card">
            <h3>🚿 Luz Banheiro</h3>
            <div id="status-banheiro" class="lamp-status status-off">DESLIGADA</div>
            <div class="control-group">
                <button class="btn-on" onclick="enviarComando('banheiro','ON')">LIGAR</button>
                <button class="btn-off" onclick="enviarComando('banheiro','OFF')">DESLIGAR</button>
            </div>
        </div>
    </div>
</div>

<!-- TELA DA COZINHA (CORRIGIDA) -->
<div id="cozinha" class="tela">
    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
    <div class="container">
        <div class="card">
            <h3>🍳 Luz Cozinha</h3>
            <div id="status-cozinha" class="lamp-status status-off">DESLIGADA</div>
            <div class="control-group">
                <button class="btn-on" onclick="enviarComando('cozinha','ON')">LIGAR</button>
                <button class="btn-off" onclick="enviarComando('cozinha','OFF')">DESLIGAR</button>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPT PRINCIPAL - LÓGICA DO SISTEMA
     ═══════════════════════════════════════════════════════════════ -->
<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURAÇÃO DO BACKEND (NENHUMA CREDENCIAL MQTT AQUI!)
// ═══════════════════════════════════════════════════════════════════
// 
// ⚠️ IMPORTANTE: Altere esta URL se seu backend estiver em outro lugar!
// 
// Se estiver rodando localmente:
// BACKEND_URL = "http://localhost:3000"
// 
// Se estiver rodando em um servidor online (ex: Render.com):
BACKEND_URL = "https://iot-backend-3nqz.onrender.com"
// ═══════════════════════════════════════════════════════════════════

const BACKEND_URL = "https://iot-backend-3nqz.onrender.com";  // <- SUA URL AQUI // <- MUDE AQUI SE PRECISAR

// ═══════════════════════════════════════════════════════════════════
// FUNÇÕES DE NAVEGAÇÃO ENTRE TELAS
// ═══════════════════════════════════════════════════════════════════
function abrirTela(id) {
    // Remove a classe 'active' de todas as telas
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('active'));
    // Adiciona 'active' na tela selecionada
    document.getElementById(id).classList.add('active');
}

function voltar() { 
    abrirTela('home'); 
}

// ═══════════════════════════════════════════════════════════════════
// FUNÇÃO PARA ENVIAR COMANDOS (LIGAR/DESLIGAR)
// ═══════════════════════════════════════════════════════════════════
// Como funciona:
// 1. O frontend NUNCA toca no MQTT diretamente
// 2. Ele envia uma requisição HTTP para o backend
// 3. O backend publica no MQTT com as credenciais seguras
// ═══════════════════════════════════════════════════════════════════
async function enviarComando(dispositivo, acao) {
    try {
        const response = await fetch(`${BACKEND_URL}/api/comando`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ dispositivo, acao })
        });
        
        if (response.ok) {
            console.log(`✅ Comando ${acao} enviado para ${dispositivo}`);
        } else {
            console.error(`❌ Erro ao enviar comando para ${dispositivo}`);
        }
    } catch (erro) {
        console.error("❌ Erro de conexão com o backend:", erro);
        document.getElementById("status-mqtt").innerText = "🔴 Offline";
    }
}

// ═══════════════════════════════════════════════════════════════════
// FUNÇÃO PARA ATUALIZAR O STATUS VISUAL DAS LÂMPADAS
// ═══════════════════════════════════════════════════════════════════
function atualizarLampada(local, estado) {
    const el = document.getElementById(`status-${local}`);
    if (!el) return;  // Sai se o elemento não existir
    
    el.innerText = (estado === "ON") ? "LIGADA" : "DESLIGADA";
    el.className = "lamp-status " + (estado === "ON" ? "status-on" : "status-off");
}

// ═══════════════════════════════════════════════════════════════════
// FUNÇÃO PARA BUSCAR DADOS DO BACKEND (POLLING)
// ═══════════════════════════════════════════════════════════════════
// A cada 2 segundos, o frontend pergunta ao backend:
// "Ei, tem dados novos?"
// Isso é chamado de POLLING (consulta periódica)
// ═══════════════════════════════════════════════════════════════════
async function buscarDados() {
    try {
        const response = await fetch(`${BACKEND_URL}/api/dados`);
        const dados = await response.json();
        
        // Se temos temperatura, atualiza o medidor e gráfico
        if (dados.temperatura !== null && dados.temperatura !== undefined) {
            processarTemperatura(dados.temperatura);
        }
        
        // Atualiza o status de cada lâmpada
        if (dados.dispositivos) {
            for (const [local, estado] of Object.entries(dados.dispositivos)) {
                atualizarLampada(local, estado);
            }
        }
        
        // Atualiza indicador de conexão
        const statusEl = document.getElementById("status-mqtt");
        if (statusEl && !statusEl.innerText.includes("⚠️")) {
            statusEl.innerText = "🟢 Online";
            statusEl.style.color = "white";
        }
        
    } catch (erro) {
        console.error("❌ Erro ao buscar dados do backend:", erro);
        const statusEl = document.getElementById("status-mqtt");
        if (statusEl) {
            statusEl.innerText = "🔴 Offline";
            statusEl.style.color = "#ef4444";
        }
    }
}

// ═══════════════════════════════════════════════════════════════════
// FUNÇÃO PARA REGISTRAR TEMPERATURA NO HISTÓRICO DO BACKEND
// ═══════════════════════════════════════════════════════════════════
async function registrarHistorico(temperatura) {
    try {
        await fetch(`${BACKEND_URL}/api/historico`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ temperatura })
        });
    } catch (erro) {
        console.error("❌ Erro ao salvar histórico:", erro);
    }
}

// ═══════════════════════════════════════════════════════════════════
// FUNÇÃO PARA CARREGAR HISTÓRICO SALVO NO BACKEND
// ═══════════════════════════════════════════════════════════════════
async function carregarHistorico() {
    try {
        const response = await fetch(`${BACKEND_URL}/api/historico`);
        const historico = await response.json();
        
        // Recupera o gráfico e recarrega com os dados históricos
        if (window.meuGrafico && historico.length > 0) {
            window.meuGrafico.data.labels = historico.map(h => h.hora);
            window.meuGrafico.data.datasets[0].data = historico.map(h => h.valor);
            window.meuGrafico.update();
        }
        
        // Recupera os logs para exportação CSV
        window.logsParaCSV = historico;
        
    } catch (erro) {
        console.error("❌ Erro ao carregar histórico:", erro);
    }
}

// ═══════════════════════════════════════════════════════════════════
// FUNÇÃO PARA PROCESSAR TEMPERATURA (MEDIDOR + ALERTA + GRÁFICO)
// ═══════════════════════════════════════════════════════════════════
function processarTemperatura(valor) {
    if (isNaN(valor)) return;
    
    // Limita o valor entre -20°C e 100°C (limites do medidor)
    valor = Math.max(-20, Math.min(100, valor));
    
    // Atualiza o texto da temperatura
    const displayTemp = document.getElementById("gauge-temp");
    const cardTemp = document.getElementById("card-temp");
    const statusMqtt = document.getElementById("status-mqtt");
    
    if (displayTemp) displayTemp.innerText = valor.toFixed(1) + " °C";

    // ═══════════════════════════════════════════════════════════
    // LÓGICA DE ALERTA: Se temperatura > 30°C, ativa alerta visual
    // ═══════════════════════════════════════════════════════════
    if (valor > 30) {
        if (cardTemp) cardTemp.classList.add("alerta-ativo");
        if (statusMqtt) {
            statusMqtt.innerText = "⚠️ ALERTA! Calor extremo ⚠️";
            statusMqtt.style.color = "#ef4444";
        }
    } else {
        if (cardTemp) cardTemp.classList.remove("alerta-ativo");
        if (statusMqtt && !statusMqtt.innerText.includes("Offline")) {
            statusMqtt.innerText = "🟢 Online";
            statusMqtt.style.color = "white";
        }
    }

    // ═══════════════════════════════════════════════════════════
    // MOVIMENTO DO PONTEIRO DO MEDIDOR ANALÓGICO
    // Mapeia a temperatura (-20 a 100) para um ângulo (-90° a +90°)
    // ═══════════════════════════════════════════════════════════
    let angulo = ((valor + 20) / 120) * 180 - 90;
    const needle = document.getElementById("needle");
    if (needle) {
        needle.style.transform = `translateX(-50%) rotate(${angulo}deg)`;
    }

    // ═══════════════════════════════════════════════════════════
    // ATUALIZAÇÃO DO GRÁFICO
    // ═══════════════════════════════════════════════════════════
    const hora = new Date().toLocaleTimeString();
    const chart = window.meuGrafico;
    
    if (chart) {
        chart.data.labels.push(hora);
        chart.data.datasets[0].data.push(valor);
        
        // Mantém apenas os últimos 10 pontos (rolagem automática)
        if (chart.data.labels.length > 10) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }
        chart.update();
    }
    
    // ═══════════════════════════════════════════════════════════
    // SALVA NO HISTÓRICO (para exportação CSV)
    // ═══════════════════════════════════════════════════════════
    const logEntry = { 
        data: new Date().toLocaleDateString(), 
        hora, 
        valor 
    };
    
    if (!window.logsParaCSV) window.logsParaCSV = [];
    window.logsParaCSV.push(logEntry);
    
    // Limita o histórico local a 1000 registros (para não travar)
    if (window.logsParaCSV.length > 1000) window.logsParaCSV.shift();
    
    // Envia para o backend salvar permanentemente
    registrarHistorico(valor);
}

// ═══════════════════════════════════════════════════════════════════
// FUNÇÃO PARA BAIXAR HISTÓRICO COMO ARQUIVO CSV
// ═══════════════════════════════════════════════════════════════════
function baixarHistorico() {
    if (!window.logsParaCSV || window.logsParaCSV.length === 0) {
        alert("Nenhum dado de temperatura registrado ainda!");
        return;
    }
    
    // Cria o cabeçalho e as linhas do CSV
    let conteudo = "Data,Hora,Temperatura(°C)\n";
    conteudo += window.logsParaCSV.map(l => `${l.data},${l.hora},${l.valor}`).join("\n");
    
    // Cria o arquivo e força o download
    const blob = new Blob([conteudo], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `historico_iot_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════════
// INICIALIZAÇÃO DO GRÁFICO (CHART.JS)
// ═══════════════════════════════════════════════════════════════════
const ctx = document.getElementById('grafico').getContext('2d');
window.meuGrafico = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Temperatura (°C)',
            data: [],
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56, 189, 248, 0.1)',
            tension: 0.3,
            fill: true
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: { display: true, position: 'top', labels: { color: 'white' } },
            tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)}°C` } }
        },
        scales: {
            y: { title: { display: true, text: 'Temperatura (°C)', color: 'white' }, ticks: { color: 'white' } },
            x: { title: { display: true, text: 'Horário', color: 'white' }, ticks: { color: 'white', maxRotation: 45, minRotation: 45 } }
        }
    }
});

// ═══════════════════════════════════════════════════════════════════
// INICIALIZAÇÃO DO SISTEMA
// ═══════════════════════════════════════════════════════════════════
window.logsParaCSV = [];

// Carrega histórico salvo ao iniciar
carregarHistorico();

// Busca dados a cada 2 segundos (polling)
setInterval(buscarDados, 2000);

// Busca dados imediatamente ao carregar a página
buscarDados();

// Mensagem de boas-vindas no console (para debug)
console.log("✅ Painel IoT inicializado!");
console.log(`📡 Backend configurado em: ${BACKEND_URL}`);
console.log("💡 Dica: Certifique-se que o backend Node.js está rodando em http://localhost:3000");
</script>

</body>
</html>
